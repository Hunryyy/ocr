# ============================================================================
# Multimodal document parsing pipeline config (performance-oriented)
# ============================================================================

profile: "balanced"

io:
  image_root: "./data/images"
  output_dir: "./output"
  cache_dir: "./cache"
  enable_cache: true               # Enable cache to avoid repeated OCR
  log_level: "INFO"

runtime:
  device: "auto"
  num_workers: 2                   # Conservative default for memory safety
  use_fp16: true
  lazy_load_fallback: true         # Load fallback detectors only when needed

models:
  # File names must match train.py outputs.
  logic_models:
    block_classifier: "block_classifier.json"
    relation_scorer: "relation_scorer_order.json" # Produced name in training logs
    relation_scorer_caption: "relation_scorer_caption.json"
  
  feature_schemas:
    block: "feature_schema_block.json"
    pair: "feature_schema_pair.json"
    label_map: "label_map.json"

  fallback_models:
    layout_detector:
      enabled: true
      type: "yolo"
      version: "yolov8n"
      score_threshold: 0.25
      postprocess:
        nested_suppression: true
        nested_iou_threshold: 0.92
        nested_containment_threshold: 0.94
        title_paragraph_refine: true
        title_boost_ratio: 1.35
        paragraph_boost_ratio: 1.05
      # --- DocLayout-YOLO / ONNX settings (set enabled: true and uncomment path/class_map to use) ---
      # path: "./models/doclayout_yolo.onnx"      # path to ONNX weight file (≤150 MB)
      # class_map: "./trainer/config/layout_class_map.json"  # index->label mapping
      # input_size: 1024                           # inference resolution (pixels)
      # nms_threshold: 0.5                         # IoU threshold used by class-agnostic NMS
      # nms_class_aware: true                      # true=class-aware NMS (recommended)
      # bbox_format: "auto"                        # "auto" | "xywh" | "xyxy"
      # hf_correction: false                       # header/footer post-correction (enable in accurate profile)
      # hf_top_ratio: 0.08                         # top page fraction for header detection
      # hf_bottom_ratio: 0.08                      # bottom page fraction for footer detection
      # hf_width_ratio: 0.5                        # min block-width/page-width to qualify
      # second_pass: false                         # second-pass inference for difficult pages
      # second_pass_min_dets: 2                    # trigger if pass-1 dets < this
      # second_pass_min_nontext: 0                 # trigger if non-text dets <= this
      # second_pass_min_avg_score: 0.0             # trigger if avg_score < this (0=disabled)
      # second_pass_input_size: 1280               # larger resolution for second pass
      # second_pass_score_threshold: 0.15          # lower threshold for second pass
    ocr:
      enabled: true
      version: "PP-OCRv4"
      lang: "ch"
      text_det_limit_side_len: 1280
      text_rec_score_thresh: 0.40
      line_score_threshold: 0.40
      line_min_text_len: 2
      full_image_max_side: 1600
      reuse_full_image_for_layout: true
      reuse_min_blocks: 1
      roi_types: ["paragraph", "title", "list_item"]
      text_correction:
        enabled: true
        use_phrase_rules: true
        use_domain_terms: true
        use_char_lm: true
        normalize_punctuation: false
    table_refiner:
      enabled: true
      min_area_ratio: 0.005
      max_side: 1400
      transformer:
        enabled: false
        backend: "hf_vision2seq"
        model_name_or_path: "microsoft/table-transformer-structure-recognition"
        max_new_tokens: 512
        prompt: "Output HTML table with rowspan/colspan only."
    formula_ocr:
      transformer:
        enabled: false
        backend: "hf_vision2seq"
        model_name_or_path: "facebook/nougat-small"
        max_new_tokens: 256
        prompt: "Read this formula and output pure LaTeX."
      openai_54:
        enabled: false
        model: "openai-5.4"
        base_url: "https://api.openai.com/v1"
        api_key_env: "OPENAI_API_KEY"
        timeout_s: 20
        max_side: 1024
        max_calls_per_page: 0

decode:
  k_order: 12                      # Expand neighborhood to improve recall
  k_caption: 5
  use_beam_search: true
  beam_width: 5                    # Wider beam for ordering robustness
  
  # Lower thresholds to improve recall on difficult pages.
  order_score_threshold: 0.20     
  caption_score_threshold: 0.35

  reading_order_hybrid:
    enabled: true
    projection_bins: 128
    min_gap_ratio: 0.045
    low_occupancy_ratio: 0.06
    max_cuts_per_level: 2
    max_depth: 8
    vertical_bias: 1.15
    cross_span_ratio: 0.72
    row_tol_ratio: 0.35
    row_tol_px: 6
    edge_min_score: 0.55
    overlap_iou_threshold: 0.35
    overlap_failure_ratio: 0.28
    default_edge_score: 0.95

  fallback_trigger:
    enabled: true
    min_blocks: 3
    max_empty_text_block_ratio: 0.0
    trigger_detector: true
    trigger_ocr: true

# ============================================================================
# Profile overlays  (merged on top of base config when profile is selected)
# ============================================================================
profiles:
  fast:
    fallback_models:
      layout_detector:
        input_size: 640
        score_threshold: 0.3
        nms_class_aware: true
        second_pass: false
        hf_correction: false
      ocr:
        text_det_limit_side_len: 1024
        text_rec_score_thresh: 0.45
        line_score_threshold: 0.45
        line_min_text_len: 2
        full_image_max_side: 1440
      table_refiner:
        enabled: true
        min_area_ratio: 0.006
        max_side: 1120

  balanced:
    fallback_models:
      layout_detector:
        input_size: 1024
        score_threshold: 0.25
        nms_class_aware: true
        second_pass: false
        hf_correction: false
      ocr:
        text_det_limit_side_len: 1280
        text_rec_score_thresh: 0.40
        line_score_threshold: 0.40
        line_min_text_len: 2
        full_image_max_side: 1600
      table_refiner:
        enabled: true
        min_area_ratio: 0.005
        max_side: 1400

  accurate:
    fallback_models:
      layout_detector:
        input_size: 1024
        score_threshold: 0.2
        nms_class_aware: true
        hf_correction: true
        second_pass: true
        second_pass_min_dets: 3
        second_pass_min_nontext: 0
        second_pass_min_avg_score: 0.3
        second_pass_input_size: 1280
        second_pass_score_threshold: 0.15
      ocr:
        text_det_limit_side_len: 1536
        text_rec_score_thresh: 0.35
        line_score_threshold: 0.35
        line_min_text_len: 1
        full_image_max_side: 1920
      table_refiner:
        enabled: true
        min_area_ratio: 0.004
        max_side: 1600
