# ============================================================================
# 多模态文档解析流水线配置文件 - 性能优化版
# ============================================================================

profile: "balanced"

io:
  image_root: "./data/images"
  output_dir: "./output"
  cache_dir: "./cache"
  enable_cache: true               # 笔记本运行必开，避免重复 OCR
  log_level: "INFO"

runtime:
  device: "auto"
  num_workers: 2                   # 针对 ThinkBook 内存保护，不建议调高
  use_fp16: true
  lazy_load_fallback: true         # 只有逻辑模型失效时才加载检测器

models:
  # 必须与 train.py 生成的文件名严格一致
  logic_models:
    block_classifier: "block_classifier.json"
    relation_scorer: "relation_scorer_order.json" # 修正：日志显示生成的是这个名字
    relation_scorer_caption: "relation_scorer_caption.json"
  
  feature_schemas:
    block: "feature_schema_block.json"
    pair: "feature_schema_pair.json"
    label_map: "label_map.json"

  fallback_models:
    layout_detector:
      enabled: true
      type: "yolo"
      version: "yolov8n"
      score_threshold: 0.25
      # --- DocLayout-YOLO integration (fill in path to use) ---
      # path: "artifacts/doclayout_yolo.onnx"       # ONNX weight path (≤150MB)
      # input_size: 1024                             # Input image size (px); use 1280 for higher recall
      # nms_threshold: 0.45                          # IoU threshold for NMS
      # nms_mode: "class_aware"                      # "class_aware" (default) | "agnostic"
      # enable_second_pass: false                    # Re-infer with larger input if first pass is poor
      # enable_hf_correction: true                   # Heuristic header/footer position correction
      # second_pass:
      #   input_size: 1280                           # Larger input size for second pass
      #   score_threshold: 0.15                      # Lower threshold for second pass
      #   min_dets_trigger: 2                        # Trigger if first pass has fewer than this many dets
      # class_map:                                   # Map model class indices to project labels
      #   0: "title"
      #   1: "paragraph"
      #   2: "table"
      #   3: "figure"
      #   4: "caption"
      #   5: "formula"
      #   6: "list_item"
      #   7: "header"
      #   8: "footer"
      #   9: "chart"
      #   10: "unknown"
      # --- end DocLayout-YOLO config ---
    ocr:
      enabled: true
      version: "PP-OCRv4"
      lang: "ch"

decode:
  k_order: 12                      # 增加搜索邻域，提升 Recall
  k_caption: 5
  use_beam_search: true
  beam_width: 5                    # 增加束搜索宽度，优化顺序
  
  # 关键优化：针对你 0.41 的召回率，降低阈值
  order_score_threshold: 0.20     
  caption_score_threshold: 0.35

  fallback_trigger:
    enabled: true
    min_blocks: 999
    max_empty_text_block_ratio: 0.0
    trigger_detector: true
    trigger_ocr: true
